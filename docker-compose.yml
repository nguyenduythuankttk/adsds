services:
  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo_data:/data/db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: DBjolibi
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile
    restart: always
    ports:
      - "127.0.0.1:3000:8080"
    environment:
      ConnectionStrings__JolibiDatabase: "server=db;port=3306;database=DBjolibi;user=root;password=${MYSQL_ROOT_PASSWORD};"
      ConnectionStrings__JolibiMongoDB: "mongodb://mongo:27017"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES}
      Resend__ApiKey: ${RESEND_API_KEY}
      Resend__FromEmail: ${RESEND_FROM_EMAIL}
      FrontendUrl: ${FRONTEND_URL}
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      mongo:
        condition: service_started
      db:
        condition: service_healthy

volumes:
  mongo_data:
  mysql_data:
