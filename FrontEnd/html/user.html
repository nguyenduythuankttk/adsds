
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài Khoản — Chônlibi </title>
    <link rel="stylesheet" href="/asset/css/style.css">
    <link rel="stylesheet" href="/asset/css/user.css">
    <link rel="stylesheet" href="/asset/themify-icons/themify-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <!-- Dummy inputs to absorb browser credential autofill away from the search bar -->
    <input type="text" name="username" style="display:none" tabindex="-1" autocomplete="username">
    <input type="password" name="password" style="display:none" tabindex="-1" autocomplete="current-password">

    <!-- HEADER -->
    <div id="header">
        <button id="hamburger-btn" aria-label="Mở menu" aria-expanded="false">☰</button>

        <ul id="nav">
            <li><a href="index.html">Home</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="#" id="nav-store-btn">Store <i class="ti-angle-down nav-arrow-down"></i></a></li>
        </ul>

        <!-- Search bar -->
        <div class="search-bar">
            <i class="ti-search search-bar-icon"></i>
            <input type="text" id="hs-name" class="search-bar-input" placeholder="Tìm món ăn..." autocomplete="off">
        </div>

        <!-- Home / User sliding toggle -->
        <div class="header-nav-toggle" id="header-nav-toggle">
            <div class="nav-toggle-thumb" id="nav-toggle-thumb"></div>
            <button class="nav-toggle-btn" id="nav-toggle-home" title="Trang chủ" aria-label="Trang chủ">
                <i class="ti-home"></i>
            </button>
            <button class="nav-toggle-btn active" id="nav-toggle-user" title="Tài khoản" aria-label="Tài khoản">
                <i class="ti-user"></i>
            </button>
        </div>

        <!-- Cart button (far right) -->
        <button class="delivery-btn delivery-cart-btn" id="cart-fab" aria-label="Xem giỏ hàng" style="display:none">
            <i class="ti-shopping-cart"></i> <span class="btn-text">Giỏ Hàng</span>
            <span class="cart-count" id="cart-count">0</span>
        </button>
    </div>
    <div id="mobile-nav-overlay"></div>

    <!-- STORE PANEL -->
    <div id="store-panel" class="store-panel">
        <div class="store-panel-inner">
            <div class="store-panel-header">
                <h3>Hệ Thống Cửa Hàng Chônlibi</h3>
                <button id="store-panel-close" class="store-panel-close">✕</button>
            </div>
            <div id="store-map"></div>
            <div class="store-map-actions">
                <div style="display: flex; gap: 10px; margin-bottom: 10px; width: 100%;">
                    <button id="find-nearest-btn" onclick="findNearestStore()" style="flex: 1; padding: 10px; border: none; background: var(--primary, #ff6b00); color: white; border-radius: 6px; cursor: pointer; font-weight: bold;">
                        <i class="ti-location-pin"></i> Vị trí hiện tại
                    </button>
                    <button id="toggle-manual-btn" onclick="toggleManualAddr()" style="flex: 1; padding: 10px; border: 1px solid #ddd; background: #f8f8f8; color: #333; border-radius: 6px; cursor: pointer; font-weight: bold;">
                        <i class="ti-pencil-alt"></i> Nhập địa chỉ
                    </button>
                </div>
                
                <div id="manual-addr-container" style="display: none; background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #ddd; width: 100%; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <select id="manual-province" onchange="onProvinceChange(this)" style="flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc; outline: none; font-family: inherit;">
                            <option value="">Chọn Tỉnh/Thành</option>
                        </select>
                        <select id="manual-district" style="flex: 1; padding: 8px; border-radius: 4px; border: 1px solid #ccc; outline: none; font-family: inherit;">
                            <option value="">Chọn Quận/Huyện</option>
                        </select>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="manual-street" placeholder="Số nhà, tên đường..." style="flex: 2; padding: 8px; border-radius: 4px; border: 1px solid #ccc; outline: none; font-family: inherit;">
                        <button onclick="findStoreByManualAddress()" style="flex: 1; background: var(--primary, #ff6b00); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
                            Tìm kiếm
                        </button>
                    </div>
                </div>

                <select id="store-region-select" onchange="filterStoresByRegion(this.value)" style="padding: 10px 15px; border-radius: 6px; border: 1px solid #ddd; outline: none; cursor: pointer; width: 100%; max-width: 100%; font-family: inherit; margin-bottom: 10px;">
                    <option value="all">📍 Tất cả các miền</option>
                    <option value="north">Miền Bắc</option>
                    <option value="central">Miền Trung</option>
                    <option value="south">Miền Nam</option>
                </select>
                <p id="nearest-store-label"></p>
            </div>
            <div id="store-list-wrapper">
                <div id="store-list" class="store-list">
                    <p style="color:#aaa;text-align:center;padding:20px">Đang tải...</p>
                </div>
            </div>
        </div>
    </div>
    <div id="store-panel-backdrop" class="store-panel-backdrop"></div>

    <!-- MAIN LAYOUT -->
    <div class="user-page-wrapper">

        <!-- SIDEBAR TRÁI -->
        <aside class="user-sidebar">
            <div class="sidebar-profile">
                <div class="sidebar-avatar" id="sidebar-avatar">A</div>
                <div class="sidebar-name" id="sidebar-name">Người dùng</div>
                <div class="sidebar-role">Người Dùng </div>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="sidebar-item active" data-section="profile">
                    <i class="ti-user"></i> Thông tin tài khoản
                </a>
                <a href="#" class="sidebar-item" data-section="orders">
                    <i class="ti-package"></i> Lịch sử đơn hàng
                </a>
                <!-- <a href="#" class="sidebar-item" data-section="reservation">
                    <i class="ti-calendar"></i> Đặt bàn
                </a> -->
                <a href="#" class="sidebar-item" data-section="address">
                    <i class="ti-location-pin"></i> Địa chỉ giao hàng
                </a>
                <a href="#" class="sidebar-item" data-section="ticket">
                    <i class="ti-ticket"></i> Mã giảm giá
                </a>
                <a href="#" class="sidebar-item" data-section="password">
                    <i class="ti-lock"></i> Đổi mật khẩu
                </a>
                <a href="#" class="sidebar-item sidebar-logout" id="btn-logout">
                    <i class="ti-power-off"></i> Đăng xuất
                </a>
            </nav>
        </aside>

        <main class="user-main" id="user-main-content">
            <!-- JS sẽ render nội dung vào đây -->
        </main>

    </div>

    <script src="/asset/js/api.js"></script>
    <script src="/asset/js/datetime.js"></script>
    <script src="/asset/js/popup.js"></script>
    <script src="/asset/js/store.js"></script>
    <script src="/asset/js/user.js"></script>
    <script src="/asset/js/mobile-nav.js"></script>
</body>
</html>
